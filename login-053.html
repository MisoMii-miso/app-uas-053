<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyCatalog - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">MyCatalog</div>
        <nav>
            <a href="index.html">Beranda</a>
            <a href="profile-053.html">Profile</a>
            <a href="transaksi-053.html">Transaksi</a>
            <a href="login-053.html">Login</a>
        </nav>
    </header>

    <div class="container">
        <section id="login" class="page-section active">
            <h2 style="margin-bottom: 5px;">Sign In</h2>
            <p class="subtitle">Silakan masuk ke akun Anda</p>

            <div class="form-container">
                <form id="loginForm">
                    <div class="form-group">
                        <label for="username">Username / Email</label>
                        <input type="text" id="username" placeholder="Masukkan nama...">
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" placeholder="Tulis pesan...">
                    </div>
                    <button type="submit" class="btn-primary w-full" style="margin-top: 10px;">Kirim Pesan (Login)</button>
                </form>
            </div>
        </section>
    </div>

    <footer>
        <p>&copy; 2026 Catalog Saya. All Rights Reserved.</p>
    </footer>

    <script src="script.js"></script>

</body>
</html>
